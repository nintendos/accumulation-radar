<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>庄家收筹雷达 Web 控制台</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <h1>庄家收筹雷达 Web 控制台</h1>
  <div class="bar">
    <button onclick="runMode('pool')" id="btn-pool">运行 pool</button>
    <button onclick="runMode('oi')" id="btn-oi">运行 oi</button>
    <button onclick="runMode('full')" id="btn-full">运行 full</button>
  </div>
  <div id="status">加载中...</div>
  <pre id="logs"></pre>
  <div class="hint">每 2 秒自动刷新。地址：<code>http://127.0.0.1:8765</code></div>
  <script src="/static/app.js"></script>
</body>
</html>
